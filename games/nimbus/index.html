<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NimbusShop · A Sala de Reunião</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<a class="game-back-link" href="../../pages/jogos.html" aria-label="Voltar para a página de jogos">← Voltar aos jogos</a>

<div class="app" id="app">

  <div class="hud" id="hud" style="display:none">
    <div class="plate"><span class="dot"></span><b id="h-rank">Estagiário</b></div>
    <div class="favor"><span class="lab">Favor do conselho</span><div class="bar"><i id="h-favor"></i></div></div>
    <span class="chip" id="h-score">⭐ 0</span>
    <button class="mute" id="h-mute" title="Som" aria-label="Ligar ou desligar som">🔊</button>
  </div>

  <div class="scene idle" id="scene" style="display:none">
    <div class="window">
      <div class="sky-stars" id="stars"></div>
      <svg class="skyline" id="skyline" viewBox="0 0 400 140" preserveAspectRatio="none"></svg>
    </div>
    <div class="screen" id="screen"></div>
    <div class="board" id="board"></div>
  </div>

  <div class="table" id="table" style="display:none">
    <div class="nameplate" id="nameplate">ESTAGIÁRIO DE DADOS</div>
    <div id="play"></div>
  </div>

  <div id="curtain"></div>
</div>
<div id="fx"></div>


<script src="assets/js/app.js" defer></script>
</body>
</html>
