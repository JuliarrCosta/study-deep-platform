<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberOps :: The Breadcrumb Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<a class="back-platform" href="../../pages/jogos.html" aria-label="Voltar aos jogos">← Voltar aos jogos</a>
<canvas id="matrix"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="ids-flash" id="idsFlash"></div>
<div class="toast-wrap" id="toasts"></div>

<!-- BOOT -->
<div id="boot">
  <div class="boot-inner">
    <div class="boot-log" id="bootLog"></div>
    <div class="boot-cta" id="bootCta">
      <button class="bigbtn" id="bootStart">▶ Iniciar Auditoria</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">CyberOps<b>::</b>The Breadcrumb Trail
      <span class="sub">NetSec Academy · Auditoria IPB</span>
    </div>
    <div class="top-mid">
      <span class="mission-tag" id="missionTag">— sem missão —</span>
    </div>
    <div class="stats">
      <div class="threat">
        <span class="k">Ameaça IDS</span>
        <div class="threat-bar"><div class="threat-fill" id="threatFill"></div></div>
      </div>
      <div class="stat"><span class="k">Flags</span><span class="v flags" id="statFlags">0</span></div>
      <div class="stat"><span class="k">Pontos</span><span class="v" id="statScore">0</span></div>
    </div>
  </div>

  <div class="split">
    <!-- KNOWLEDGE -->
    <div class="pane know">
      <div class="pane-head"><span class="dot"></span><span id="knowHeadLabel">Painel de Conhecimento — Teoria</span></div>
      <div class="know-body" id="knowBody"></div>
      <div class="know-foot">
        <button class="minibtn" id="btnMissions">◀ Missões</button>
        <button class="minibtn" id="btnGuide">⬇ Guia de estudo</button>
        <span class="gate-note" id="gateNote"></span>
      </div>
    </div>

    <!-- TERMINAL -->
    <div class="pane term">
      <div class="pane-head"><span class="dot"></span><span id="termHeadLabel">Terminal Interativo — Prática</span>
        <span class="term-host" id="termHost">analista@netsec : ~</span>
      </div>
      <div class="term-out" id="termOut"></div>
      <div class="trail" id="trail">
        <span class="trail-label">Trilho</span>
      </div>
      <div class="term-input-row" id="inputRow">
        <span class="term-ps1" id="ps1">analista@netsec<span style="color:var(--text)">:</span><span class="p">~</span>$</span>
        <input id="cmd" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="escreve um comando…  (tenta 'help')">
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<script src="assets/js/app.js" defer></script>
</body>
</html>
